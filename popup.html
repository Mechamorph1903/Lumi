<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumi</title>

    <!--
      This file is the visual panel that appears when you click the extension icon.
      Keep it simple - it's just a normal HTML file, same as any webpage.
      The only rule: no inline JavaScript allowed in Manifest V3.
      All JS must live in popup.js, never inside <script> tags here.
    -->

    <link rel="stylesheet" href="popup.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">  </head>

  <body>

    <header>
      <h1>💡Lumi</h1>
      <p>Your trusty AI Reading Companion</p>
    </header>

    <main>

      <!-- PRIMARY ACTIONS -->
      <!-- These buttons trigger the two main features -->
      <!-- The actual click logic lives in popup.js, not here -->

      <textarea 
        id="user-prompt" 
         placeholder="Tell Lumi What to Focus On"
      ></textarea>

      <button id="btn-summarize-page">
        Summarize Full Page
      </button>

      <button id="btn-read-selection">
        Read My Selection
      </button>


      <!-- STATUS INDICATOR -->
      <!-- This text updates to tell the user what's happening -->
      <!-- States: idle / thinking / reading / done / error -->

      <p id="status-text">Ready</p>
      <!-- AUDIO CONTROLS -->
      <!-- These control the Web Speech API playback -->
      <!-- They should probably be hidden until a summary is being read -->

      <div id="audio-controls">

        <div id="progress-section">
          <input type="range" id="progress-bar" min="0" max="100" step="0.1" value="0" />
          <div id="time-display">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <div id="speech-buttons">
          <button id="btn-rewind" title="Rewind 10s"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><title>Rewind-10 SVG Icon</title><path fill="currentColor" d="M4 18A12 12 0 1 0 16 6h-4V1L6 7l6 6V8h4A10 10 0 1 1 6 18Z"/><path fill="currentColor" d="M19.63 22.13a2.84 2.84 0 0 1-1.28-.27a2.44 2.44 0 0 1-.89-.77a3.57 3.57 0 0 1-.52-1.25a7.69 7.69 0 0 1-.17-1.68a7.83 7.83 0 0 1 .17-1.68a3.65 3.65 0 0 1 .52-1.25a2.44 2.44 0 0 1 .89-.77a2.84 2.84 0 0 1 1.28-.27a2.44 2.44 0 0 1 2.16 1a5.23 5.23 0 0 1 .7 2.93a5.23 5.23 0 0 1-.7 2.93a2.44 2.44 0 0 1-2.16 1.08m0-1.22a1.07 1.07 0 0 0 1-.55a3.38 3.38 0 0 0 .37-1.51v-1.38a3.31 3.31 0 0 0-.29-1.5a1.23 1.23 0 0 0-2.06 0a3.31 3.31 0 0 0-.29 1.5v1.38a3.38 3.38 0 0 0 .29 1.51a1.06 1.06 0 0 0 .98.55m-9 1.09v-1.18h2v-5.19l-1.86 1l-.55-1.06l2.32-1.3H14v6.5h1.78V22z"/></svg></button>
          <button id="btn-play-pause" data-state="playing" title="Play / Pause"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><title>Play-filled-alt SVG Icon</title><path fill="currentColor" d="M7 28a1 1 0 0 1-1-1V5a1 1 0 0 1 1.482-.876l20 11a1 1 0 0 1 0 1.752l-20 11A1 1 0 0 1 7 28"/></svg></button>
          <button id="btn-fastfwd" title="Fast Forward 10s"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><title>Forward-10 SVG Icon</title><path fill="currentColor" d="M26 18A10 10 0 1 1 16 8h4v5l6-6l-6-6v5h-4a12 12 0 1 0 12 12Z"/><path fill="currentColor" d="M19.63 22.13a2.84 2.84 0 0 1-1.28-.27a2.44 2.44 0 0 1-.89-.77a3.57 3.57 0 0 1-.52-1.25a7.69 7.69 0 0 1-.17-1.68a7.83 7.83 0 0 1 .17-1.68a3.65 3.65 0 0 1 .52-1.25a2.44 2.44 0 0 1 .89-.77a2.84 2.84 0 0 1 1.28-.27a2.44 2.44 0 0 1 2.16 1a5.23 5.23 0 0 1 .7 2.93a5.23 5.23 0 0 1-.7 2.93a2.44 2.44 0 0 1-2.16 1.08m0-1.22a1.07 1.07 0 0 0 1-.55a3.38 3.38 0 0 0 .37-1.51v-1.38a3.31 3.31 0 0 0-.29-1.5a1.23 1.23 0 0 0-2.06 0a3.31 3.31 0 0 0-.29 1.5v1.38a3.38 3.38 0 0 0 .29 1.51a1.06 1.06 0 0 0 .98.55m-9 1.09v-1.18h2v-5.19l-1.86 1l-.55-1.06l2.32-1.3H14v6.5h1.78V22z"/></svg></button>
        </div>

        <div id="speed-control">
          <label for="speed-slider">Speed</label>
          <input
            type="range"
            id="speed-slider"
            min="0.5"
            max="2"
            step="0.1"
            value="1"
          />
        </div>
<div id="language-control">
          <label for="language-select">Output Language</label>
          <select id="language-select" aria-label="Select output language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ar">Arabic</option>
            <option value="pt">Portuguese</option>
            <option value="hi">Hindi</option>
            <option value="ko">Korean</option>
          </select>
      </div>
      </div>

      <button id="toggle-summary">Show Summary</button>
      <div id="summary-container" class="hidden">
        <h3>Summary</h3>
        <p id="summary-text"></p>
      </div>

    </main>

    <!--
      popup.js is loaded here at the bottom of the body.
      It handles all button clicks and updates this HTML.
      It also talks to background.js which handles the Claude API call.
    -->
    <script src="popup.js"></script>

  </body>
</html>
